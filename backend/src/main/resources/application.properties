spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# JWT Configuration
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Two-Factor Authentication (2FA) Configuration
auth.2fa.enabled=${AUTH_2FA_ENABLED:true}
auth.2fa.issuer=${AUTH_2FA_ISSUER:CIMS}
auth.2fa.code-validity-seconds=30
auth.2fa.backup-codes-count=10

# Passkey (WebAuthn) Configuration
auth.passkey.enabled=${AUTH_PASSKEY_ENABLED:true}
auth.passkey.rp-name=${AUTH_PASSKEY_RP_NAME:CIMS}
auth.passkey.rp-id=${AUTH_PASSKEY_RP_ID:localhost}
auth.passkey.origin=${AUTH_PASSKEY_ORIGIN:http://localhost:5173}
auth.passkey.timeout=60000
auth.passkey.attestation=none

# Captcha Configuration
auth.captcha.enabled=${AUTH_CAPTCHA_ENABLED:false}
auth.captcha.provider=${AUTH_CAPTCHA_PROVIDER:recaptcha}
auth.captcha.site-key=${CAPTCHA_SITE_KEY:}
auth.captcha.secret-key=${CAPTCHA_SECRET_KEY:}
auth.captcha.verify-url=https://www.google.com/recaptcha/api/siteverify
auth.captcha.threshold=0.5

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

# File Storage
file.upload-dir=./uploads
file.max-size=10485760

# Mail Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ompyadav@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ypas irvq gbhn aqld}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email Configuration
email.from=${EMAIL_FROM:noreply@cims.com}
email.enabled=${EMAIL_ENABLED:true}
app.frontend.url=${FRONTEND_URL:http://localhost:5174}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.cims.app=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# API Documentation - Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none

# Application Specific Configuration
app.name=Continuous Improvement Management System
app.version=1.0.0
app.description=Enterprise CI Management Platform
app.timezone=UTC

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# Pagination
app.pagination.default-page-size=20
app.pagination.max-page-size=100

# Cache Configuration
spring.cache.type=simple
spring.cache.cache-names=users,ideas,categories,departments

# Async Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-

# Scheduler Configuration
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=scheduler-

# Notification Configuration
notification.email.enabled=${EMAIL_ENABLED:false}
notification.in-app.enabled=true
notification.batch-size=50

# Audit Configuration
audit.enabled=true
audit.retention-days=365

# Security Headers
server.servlet.session.cookie.same-site=strict

